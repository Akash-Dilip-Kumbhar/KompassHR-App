<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminous Glass UI - Profile</title>

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-luminous pb-5 mb-5 team-page-body">

    <!-- Mobile Wrapper -->
    <div class="mobile-wrapper min-vh-100 position-relative d-flex flex-column">

        <!-- Header -->
        <div class="pt-4 pb-2 px-4 z-3 d-flex align-items-center gap-3">
            <a href="dashboard.html" class="text-dark text-decoration-none">
                <i class="bi bi-arrow-left fs-4"></i>
            </a>
            <h1 class="display-6 fw-bold text-dark mb-0"
                style="color: #1a2342 !important; letter-spacing: -1px; font-size: 1.5rem;">
                Profile
            </h1>
        </div>

        <!-- App Content -->
        <div class="app-content px-4 pt-4 flex-grow-1 d-flex flex-column">

            <!-- Profile Avatar Section -->
            <div class="d-flex flex-column align-items-center text-center mb-5">
                <div class="position-relative mb-3">
                    <img src="https://i.pravatar.cc/150?img=11" alt="Akash Kumbhar"
                        class="rounded-circle shadow-sm border border-4 border-white"
                        style="width: 100px; height: 100px; object-fit: cover;">
                    <span class="position-absolute bg-success border border-light rounded-circle"
                        style="width: 16px; height: 16px; bottom: 5px; right: 5px;"></span>
                </div>
                <h3 class="fw-bold text-dark mb-1">Akash Kumbhar</h3>
                <p class="text-muted fw-semibold mb-0">Frontend Developer</p>
            </div>

            <!-- Profile Menu Options -->
            <div class="glass-effect rounded-4 p-2 shadow-sm mb-4">
                <div class="list-group list-group-flush border-0 gap-1">
                    <a href="userprofile.html"
                        class="list-group-item list-group-item-action border-0 rounded-3 d-flex align-items-center gap-3 py-3 bg-transparent">
                        <div class="bg-soft-primary p-2 rounded-3 text-primary d-flex align-items-center justify-content-center"
                            style="width: 40px; height: 40px;">
                            <i class="bi bi-person-badge fs-5"></i>
                        </div>
                        <span class="fw-semibold text-dark flex-grow-1">My Profile</span>
                        <i class="bi bi-chevron-right text-muted small"></i>
                    </a>
                    <a href="#"
                        class="list-group-item list-group-item-action border-0 rounded-3 d-flex align-items-center gap-3 py-3 bg-transparent">
                        <div class="bg-soft-warning p-2 rounded-3 text-warning d-flex align-items-center justify-content-center"
                            style="width: 40px; height: 40px;">
                            <i class="bi bi-gear fs-5"></i>
                        </div>
                        <span class="fw-semibold text-dark flex-grow-1">Settings</span>
                        <i class="bi bi-chevron-right text-muted small"></i>
                    </a>
                    <a href="#"
                        class="list-group-item list-group-item-action border-0 rounded-3 d-flex align-items-center gap-3 py-3 bg-transparent">
                        <div class="bg-soft-info p-2 rounded-3 text-info d-flex align-items-center justify-content-center"
                            style="width: 40px; height: 40px;">
                            <i class="bi bi-clock-history fs-5"></i>
                        </div>
                        <span class="fw-semibold text-dark flex-grow-1">Attendance History</span>
                        <i class="bi bi-chevron-right text-muted small"></i>
                    </a>
                </div>
            </div>

            <!-- Spacer -->
            <div class="flex-grow-1"></div>

            <!-- Logout Button -->
            <div class="mt-4 mb-3">
                <a href="index.html"
                    class="btn btn-soft-danger w-100 py-3 fw-bold d-flex justify-content-center align-items-center gap-2 rounded-4 shadow-sm">
                    <i class="bi bi-box-arrow-right fs-5"></i> Logout
                </a>
            </div>

        </div>

    </div> <!-- End Mobile Wrapper -->

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
